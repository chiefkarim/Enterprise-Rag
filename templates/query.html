<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latafarraqo Vector Search</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/query.css" />
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <div class="page">
      <header class="site-header">
        <div class="brand">
          <img
            src="/static/latafarraqo-logo/vector/default-monochrome-white.svg"
            alt="Latafarraqo logo"
            width="200"
            height="400"
            fetchpriority="high"
          />
          <div class="brand-text">
            <h1>Vector Search</h1>
            <p class="subtitle">
              Find documents fast with scoped filters & instant JSON output.
            </p>
          </div>
        </div>
      </header>

      <main id="main" class="card">
        <h2>Ask a Question</h2>

        <form id="queryForm">
          <div class="form-row">
            <label for="queryInput">Question</label>
            <input
              type="search"
              id="queryInput"
              name="query"
              autocomplete="off"
              inputmode="search"
              required
            />
          </div>

          <div class="form-row">
            <label for="departmentSelect">Department</label>
            <select id="departmentSelect" name="department" autocomplete="off">
              <option value="">No Filter</option>
              {% for dep in departments %}
              <option value="{{ dep }}">{{ dep }}</option>
              {% endfor %}
            </select>
          </div>

          <fieldset>
            <legend>Created At Range</legend>

            <div class="form-row">
              <label for="createdFrom">From</label>
              <input
                type="date"
                id="createdFrom"
                name="createdFrom"
                autocomplete="off"
              />
            </div>

            <div class="form-row">
              <label for="createdTo">To</label>
              <input
                type="date"
                id="createdTo"
                name="createdTo"
                autocomplete="off"
              />
            </div>

            <div class="help-text">
              Dates are sent as RFC3339 (UTC). Leaving either blank means no
              bound.
            </div>
          </fieldset>

          <button id="submitBtn" type="submit">Search Documents</button>
        </form>

        <section class="results">
          <h2>Results</h2>
          <pre id="result" aria-live="polite" role="status"></pre>
        </section>
      </main>
    </div>

    <script>
      const form = document.getElementById("queryForm");
      const resultEl = document.getElementById("result");
      const submitBtn = document.getElementById("submitBtn");

      function dateToRFC3339UTC(dateStr, { endOfDay = false } = {}) {
        if (!dateStr) return null;
        const [y, m, d] = dateStr.split("-").map(Number);
        if (!y || !m || !d) return null;

        const dt = endOfDay
          ? new Date(Date.UTC(y, m - 1, d, 23, 59, 59))
          : new Date(Date.UTC(y, m - 1, d, 0, 0, 0));

        return dt.toISOString();
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const query = document.getElementById("queryInput").value.trim();
        const department = document.getElementById("departmentSelect").value;
        const createdFrom = document.getElementById("createdFrom").value;
        const createdTo = document.getElementById("createdTo").value;

        const gte = dateToRFC3339UTC(createdFrom, { endOfDay: false });
        const lte = dateToRFC3339UTC(createdTo, { endOfDay: true });

        const filters = {};

        if (department) {
          filters.department = department;
        }

        if (gte !== null || lte !== null) {
          filters.created_at = {};
          if (gte !== null) filters.created_at.gte = gte;
          if (lte !== null) filters.created_at.lte = lte;
        }

        const payload = {
          query,
          filters: Object.keys(filters).length ? filters : null,
        };

        const queryParams = new URLSearchParams();
        if (query) queryParams.set("query", query);
        if (department) queryParams.set("department", department);
        if (createdFrom) queryParams.set("createdFrom", createdFrom);
        if (createdTo) queryParams.set("createdTo", createdTo);
        const nextUrl = `${window.location.pathname}?${queryParams.toString()}`;
        window.history.replaceState({}, "", nextUrl);

        submitBtn.disabled = true;
        submitBtn.textContent = "Searching…";
        resultEl.textContent = "";
        resultEl.setAttribute("aria-busy", "true");

        try {
          const res = await fetch("/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const text = await res.text();
          try {
            const json = JSON.parse(text);
            resultEl.textContent = JSON.stringify(json, null, 2);
          } catch {
            resultEl.textContent = text;
          }
        } catch (err) {
          resultEl.textContent = "Request failed: " + err;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Search Documents";
          resultEl.setAttribute("aria-busy", "false");
        }
      });
    </script>
  </body>
</html>
